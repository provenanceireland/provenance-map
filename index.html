<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060807" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Provenance" />
  <title>Provenance — Real Food Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #060807;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #E8DEC8;
    }

    /* ── MAP ── */
    #map-img {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      z-index: 1;
      display: block;
    }

    #pins {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }

    /* ── HEADER ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: calc(env(safe-area-inset-top, 20px) + 18px) 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(to bottom, rgba(6,8,7,0.90) 0%, rgba(6,8,7,0) 100%);
      pointer-events: none;
    }

    #header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.9rem;
      font-weight: 500;
      color: #f8f8f3;
      letter-spacing: 0.14em;
      line-height: 1;
    }

    #header p {
      font-size: 0.58rem;
      font-weight: 300;
      color: #504838;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── FILTER ── */
    #filter {
      position: fixed;
      top: calc(env(safe-area-inset-top, 20px) + 90px);
      left: 0; right: 0;
      z-index: 11;
      display: flex;
      gap: 7px;
      padding: 0 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #filter::-webkit-scrollbar { display: none; }

    .filter-pill {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(74,138,85,0.28);
      color: #504838;
      background: rgba(6,8,7,0.75);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-pill.active {
      background: rgba(74,138,85,0.15);
      border-color: rgba(74,138,85,0.55);
      color: #4A8A55;
    }

    /* ── PINS — FREE ── */
    .pin {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 20px;
      margin: -20px;
    }

    .pin-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4A8A55;
      border: 1px solid rgba(248,248,243,0.8);
      box-shadow: 0 0 6px 2px rgba(74,138,85,0.45);
      position: relative;
      z-index: 1;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .pin-pulse {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(74,138,85,0.28);
      animation: pulse-green 2.8s ease-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-green {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.75; }
      100% { transform: translate(-50%,-50%) scale(3.8); opacity: 0; }
    }

    .pin:active .pin-dot { transform: scale(1.45); }

    /* ── PINS — PAID ── */
    .pin.paid .pin-dot {
      width: 7px; height: 7px;
      background: #C4A44A;
      border: 2px solid rgba(248,248,243,0.95);
      box-shadow: 0 0 16px 5px rgba(196,164,74,0.55), 0 0 6px 1px rgba(196,164,74,0.8);
    }

    .pin.paid .pin-pulse {
      width: 7px; height: 7px;
      background: rgba(196,164,74,0.28);
      animation: pulse-gold 2.4s ease-out infinite;
    }

    @keyframes pulse-gold {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.85; }
      100% { transform: translate(-50%,-50%) scale(4.2); opacity: 0; }
    }

    /* ── APPLY BUTTON ── */
    #apply-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 16px) + 22px);
      right: 20px;
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 7px;
      background: #C4A44A;
      color: #060807;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      border: none;
      border-radius: 24px;
      padding: 11px 18px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 22px rgba(196,164,74,0.32);
      transition: opacity 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #apply-btn:hover { opacity: 0.88; }
    #apply-btn:active { transform: scale(0.97); }
    #apply-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; inset: 0;
      z-index: 20;
      background: transparent;
      pointer-events: none;
      transition: background 0.3s ease;
    }
    #overlay.active {
      background: rgba(6,8,7,0.62);
      pointer-events: all;
    }

    /* ── CARD ── */
    #card {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: #0E100D;
      border-radius: 18px 18px 0 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32,0.72,0,1);
      max-width: 560px;
      margin: 0 auto;
      max-height: 88vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #card.open { transform: translateY(0); }

    .card-top {
      position: relative;
      padding-top: 1px;
    }

    .card-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: #1c2024;
      margin: 14px auto 0;
    }

    .card-close {
      position: absolute;
      top: 10px; right: 14px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .card-close:hover { background: rgba(255,255,255,0.09); }
    .card-close svg {
      width: 11px; height: 11px;
      stroke: #504838;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* Photo */
    .card-photo-wrap {
      width: 100%;
      height: 185px;
      background: #080a09;
      margin-top: 14px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-photo-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
    }
    .card-photo-wrap .photo-placeholder svg {
      width: 34px; height: 34px;
      opacity: 0.08;
    }

    /* Body */
    .card-body {
      padding: 18px 22px calc(env(safe-area-inset-bottom, 16px) + 30px);
    }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge-free {
      background: rgba(74,138,85,0.10);
      border: 1px solid rgba(74,138,85,0.28);
      color: #4A8A55;
    }
    .badge-free::before { background: #4A8A55; }
    .badge-paid {
      background: rgba(196,164,74,0.10);
      border: 1px solid rgba(196,164,74,0.32);
      color: #C4A44A;
    }
    .badge-paid::before { background: #C4A44A; }

    #card-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 2rem;
      font-weight: 600;
      color: #f8f8f3;
      line-height: 1.05;
      margin-bottom: 5px;
    }

    .card-location {
      font-size: 0.67rem;
      color: #504838;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card-product {
      font-size: 0.9rem;
      color: #6e7868;
      margin-bottom: 14px;
    }

    .card-description {
      font-size: 0.92rem;
      color: #a8a090;
      line-height: 1.68;
      font-style: italic;
      margin-bottom: 20px;
    }

    .card-divider {
      height: 1px;
      background: #161a1d;
      margin-bottom: 16px;
    }

    .card-links { display: flex; flex-direction: column; gap: 11px; }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: #E8DEC8;
      text-decoration: none;
      font-size: 0.83rem;
      opacity: 0.65;
      transition: opacity 0.2s;
    }
    .card-link:hover { opacity: 1; }
    .card-link svg {
      width: 15px; height: 15px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <img id="map-img" src="ireland-map.png.png" alt="Map of Ireland" />

  <div id="pins">

    <!-- FOUNDING PRODUCER — Saltrock Dairy Farm — Tier 2: POV Verified (€99) -->
    <div class="pin"
         data-x="73" data-y="63"
         data-tier="0"
         data-badge="Verification in Progress"
         data-category="dairy"
         data-name="Saltrock Dairy Farm"
         data-location="Co. Wexford"
         data-product="Dairy Farm"
         data-description="A family farm on the Wexford coastline producing whole milk from grass fed pasture raised cows."
         data-instagram="saltrockfarm"
         data-website="https://saltrockdairy.ie"
         data-photo="saltrock.jpg">
      <div class="pin-pulse"></div>
      <div class="pin-dot"></div>
    </div>

    <!-- FREE LISTING — Gorse Farm -->
    <div class="pin"
         data-x="67" data-y="64"
         data-tier="0"
         data-category="vegetables"
         data-name="Gorse Farm"
         data-location="Bunclody, Co. Wexford"
         data-product="Salad &amp; Vegetables"
         data-photo="Gorse Farm.png">
      <div class="pin-pulse"></div>
      <div class="pin-dot"></div>
    </div>

    <!-- FREE LISTING — Regan Organic Farm -->
    <div class="pin"
         data-x="66" data-y="66"
         data-tier="0"
         data-category="chicken"
         data-name="Regan Organic Farm"
         data-location="Enniscorthy, Co. Wexford"
         data-product="Organic Chicken"
         data-photo="Regan Farm.webp">
      <div class="pin-pulse"></div>
      <div class="pin-dot"></div>
    </div>

    <!-- FREE LISTING — Rathgarogue Organic Farm -->
    <div class="pin"
         data-x="64" data-y="68"
         data-tier="0"
         data-category="eggs"
         data-name="Rathgarogue Organic Farm"
         data-location="New Ross, Co. Wexford"
         data-product="Organic Eggs"
         data-photo="Rathgarogue.jpg">
      <div class="pin-pulse"></div>
      <div class="pin-dot"></div>
    </div>

  </div>

  <!-- HEADER -->
  <div id="header">
    <h1>Provenance</h1>
    <p>Real food. Named source. Verified producer.</p>
  </div>

  <!-- FILTER -->
  <div id="filter">
    <button class="filter-pill active" data-filter="all">All</button>
    <button class="filter-pill" data-filter="dairy">Dairy</button>
    <button class="filter-pill" data-filter="vegetables">Vegetables</button>
    <button class="filter-pill" data-filter="eggs">Eggs</button>
    <button class="filter-pill" data-filter="chicken">Chicken</button>
  </div>

  <!-- APPLY BUTTON -->
  <a id="apply-btn" href="https://provenancemap.fillout.com/t/uhxfxup3ukus" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
    List Your Farm
  </a>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <!-- CARD -->
  <div id="card">
    <div class="card-top">
      <div class="card-handle"></div>
      <button class="card-close" id="card-close" aria-label="Close">
        <svg viewBox="0 0 24 24">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="card-photo-wrap" id="card-photo-wrap">
      <div class="photo-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f8f8f3" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
    </div>

    <div class="card-body">
      <div id="card-badge"></div>
      <h2 id="card-name"></h2>
      <p class="card-location" id="card-location"></p>
      <p class="card-product" id="card-product"></p>
      <p class="card-description hidden" id="card-description"></p>
      <div class="card-divider hidden" id="card-divider"></div>
      <div class="card-links hidden" id="card-links">
        <a class="card-link hidden" id="card-instagram" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="4"/>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
          <span id="card-instagram-handle"></span>
        </a>
        <a class="card-link hidden" id="card-website" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20"/>
            <path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/>
          </svg>
          <span id="card-website-text"></span>
        </a>
      </div>
    </div>
  </div>

  <script>
    const mapImg = document.getElementById('map-img');

    // Geographic bounds of the map image
    function positionPins() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const iw = mapImg.naturalWidth;
      const ih = mapImg.naturalHeight;
      if (!iw || !ih) return;
      const scale = Math.min(vw / iw, vh / ih);
      const rw = iw * scale;
      const rh = ih * scale;
      const ox = (vw - rw) / 2;
      const oy = (vh - rh) / 2;
      document.querySelectorAll('.pin').forEach(pin => {
        const px = parseFloat(pin.dataset.x) / 100;
        const py = parseFloat(pin.dataset.y) / 100;
        pin.style.left = (ox + px * rw) + 'px';
        pin.style.top  = (oy + py * rh) + 'px';
      });
    }

    mapImg.addEventListener('load', positionPins);
    if (mapImg.complete) positionPins();
    window.addEventListener('resize', positionPins);

    const card    = document.getElementById('card');
    const overlay = document.getElementById('overlay');
    const applyBtn = document.getElementById('apply-btn');

    const TIER_LABELS = {
      0: { text: 'Free Listing',       cls: 'badge badge-free' },
      1: { text: 'Provenance Verified', cls: 'badge badge-paid' },
      2: { text: 'POV Verified',       cls: 'badge badge-paid' },
      3: { text: 'Provenance Seal',    cls: 'badge badge-paid' },
    };

    function openCard(pin) {
      const tier   = parseInt(pin.dataset.tier || '0');
      const isPaid = tier >= 1;

      // Badge
      const t = TIER_LABELS[tier] || TIER_LABELS[0];
      const badgeText = pin.dataset.badge || t.text;
      document.getElementById('card-badge').innerHTML =
        `<span class="${t.cls}">${badgeText}</span>`;

      document.getElementById('card-name').textContent     = pin.dataset.name;
      document.getElementById('card-location').textContent = pin.dataset.location;
      document.getElementById('card-product').textContent  = pin.dataset.product;

      // Photo
      const photoWrap = document.getElementById('card-photo-wrap');
      if (pin.dataset.photo) {
        photoWrap.innerHTML = `<img src="${pin.dataset.photo}" alt="${pin.dataset.name}" />`;
      } else {
        photoWrap.innerHTML = `<div class="photo-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="#f8f8f3" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;
      }

      const desc    = document.getElementById('card-description');
      const divider = document.getElementById('card-divider');
      const links   = document.getElementById('card-links');

      if (isPaid && pin.dataset.description) {
        desc.textContent = pin.dataset.description;
        desc.classList.remove('hidden');
        divider.classList.remove('hidden');
      } else {
        desc.classList.add('hidden');
        divider.classList.add('hidden');
      }

      if (isPaid) {
        links.classList.remove('hidden');

        const igEl     = document.getElementById('card-instagram');
        const igHandle = pin.dataset.instagram;
        if (igHandle) {
          igEl.href = `https://instagram.com/${igHandle}`;
          document.getElementById('card-instagram-handle').textContent = `@${igHandle}`;
          igEl.classList.remove('hidden');
        } else {
          igEl.classList.add('hidden');
        }

        const wsEl  = document.getElementById('card-website');
        const wsUrl = pin.dataset.website;
        if (wsUrl) {
          wsEl.href = wsUrl;
          document.getElementById('card-website-text').textContent =
            wsUrl.replace(/^https?:\/\//, '');
          wsEl.classList.remove('hidden');
        } else {
          wsEl.classList.add('hidden');
        }
      } else {
        links.classList.add('hidden');
      }

      card.classList.add('open');
      overlay.classList.add('active');
      applyBtn.style.display = 'none';
    }

    function closeCard() {
      card.classList.remove('open');
      overlay.classList.remove('active');
      applyBtn.style.display = '';
    }

    document.querySelectorAll('.pin').forEach(pin => {
      pin.addEventListener('click', e => { e.stopPropagation(); openCard(pin); });
    });

    overlay.addEventListener('click', closeCard);
    document.getElementById('card-close').addEventListener('click', closeCard);

    // Swipe down to dismiss
    let touchStartY = 0;
    card.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    card.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - touchStartY > 60) closeCard();
    }, { passive: true });

    // Category filter
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        const filter = pill.dataset.filter;
        document.querySelectorAll('.pin').forEach(pin => {
          pin.style.display =
            (filter === 'all' || pin.dataset.category === filter) ? '' : 'none';
        });
        closeCard();
      });
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
